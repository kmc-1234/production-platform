apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: production-platform-alerts
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: platform.rules
      rules:
        - alert: HighCPUUsage
          expr: avg(rate(container_cpu_usage_seconds_total{container!="",pod=~"production-platform.*"}[5m])) by (pod) > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Pod CPU usage is above 80%
        - alert: HighMemoryUsage
          expr: avg(container_memory_working_set_bytes{container!="",pod=~"production-platform.*"} / container_spec_memory_limit_bytes{container!="",pod=~"production-platform.*"}) by (pod) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Pod memory usage is above 85%
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{pod=~"production-platform.*"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Pod is restarting repeatedly
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Node exporter target is down
        - alert: PVCNearlyFull
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Persistent volume claim is more than 85% full
