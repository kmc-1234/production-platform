apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "production-platform.fullname" . }}-config
  labels:
    {{- include "production-platform.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  API_URL: "http://{{ include "production-platform.fullname" . }}-backend:8080"
  AUTH_URL: "http://{{ include "production-platform.fullname" . }}-auth:8081"
  NOTIFICATION_URL: "http://{{ include "production-platform.fullname" . }}-notification:8082"
  MONGO_HOST: "{{ include "production-platform.fullname" . }}-mongodb"
