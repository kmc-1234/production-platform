apiVersion: v1
kind: Secret
metadata:
  name: {{ include "production-platform.fullname" . }}-secrets
  labels:
    {{- include "production-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  API_KEY: {{ .Values.secrets.apiKey | quote }}
