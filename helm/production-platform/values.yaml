global:
  imageRegistry: ghcr.io/example/production-platform
  imagePullPolicy: IfNotPresent
  logLevel: info

ingress:
  enabled: true
  className: nginx
  tls:
    enabled: true
    secretName: production-platform-tls
  hosts:
    frontend: app.example.com
    backend: api.example.com
    auth: auth.example.com
    notification: notifications.example.com

secrets:
  jwtSecret: change-me-in-production
  mongoRootPassword: change-me-in-production
  smtpPassword: change-me-in-production
  apiKey: change-me-in-production

services:
  frontend:
    image: frontend
    tag: "1.0.0"
    port: 8080
    replicas: 2
    path: /
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  backend:
    image: backend
    tag: "1.0.0"
    port: 8080
    replicas: 2
    path: /api
    resources:
      requests:
        cpu: 150m
        memory: 128Mi
      limits:
        cpu: 750m
        memory: 512Mi
  auth:
    image: auth
    tag: "1.0.0"
    port: 8081
    replicas: 2
    path: /auth
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  notification:
    image: notification
    tag: "1.0.0"
    port: 8082
    replicas: 2
    path: /notifications
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

mongodb:
  enabled: true
  image: mongo:7.0
  storageClassName: ""
  storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

networkPolicy:
  enabled: true
